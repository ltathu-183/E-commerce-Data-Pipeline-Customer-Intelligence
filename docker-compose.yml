services:
  db:
    image: postgres:15
    container_name: olist-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: olist-etl
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: ecommerce
      USE_DATABASE: "true"
      ENABLE_NLP: "false"
      DATA_RAW: /app/data/raw
      DATA_PROCESSED: /app/data/processed
    volumes:
      - ./data/raw:/app/data/raw:ro
      - ./data/processed:/app/data/processed

volumes:
  pgdata: