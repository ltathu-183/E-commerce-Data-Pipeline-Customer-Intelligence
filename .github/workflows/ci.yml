name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        
    - name: Install dependencies
      run: uv sync
      
    - name: Run tests
      run: uv run pytest tests/ -v --cov=src --cov-report=xml
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        
    - name: Lint with ruff
      run: |
        uv run ruff check src/ tests/
        uv run ruff format --check src/ tests/
        
    - name: Type check with mypy
      run: uv run mypy src/ --ignore-missing-imports
      
    - name: Run pipeline smoke test
      run: |
        # Create minimal test data
        mkdir -p data/raw
        echo "order_id,order_item_id,product_id,seller_id,shipping_limit_date,price,freight_value" > data/raw/olist_order_items_dataset.csv
        echo "test_order,1,test_product,test_seller,2018-01-01,100.0,10.0" >> data/raw/olist_order_items_dataset.csv
        
        # Run pipeline (will fail gracefully without full data)
        timeout 30 uv run python src/etl_pipeline.py || echo "Pipeline test completed (expected partial failure without full dataset)"