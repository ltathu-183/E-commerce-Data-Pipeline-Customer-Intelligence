# Welcome to Great Expectations! Always know what to expect from your data.
config_version: 3.0
template_name:
module_name: great_expectations.data_context
class_name: EphemeralDataContext
run_kwargs:
  runtime_environment:
    usage_statistics_enabled: true
  result_callback:
    class_name: LoggingCallback
stores:
  expectations_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/expectations/
  validations_store:
    class_name: ValidationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/validations/
  evaluation_parameter_store:
    class_name: EvaluationParameterStore
  checkpoint_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/checkpoints/
expectations_store_name: expectations_store
validations_store_name: validations_store
evaluation_parameter_store_name: evaluation_parameter_store
checkpoint_store_name: checkpoint_store
data_docs_sites:
  local_site:
    class_name: SiteBuilder
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/data_docs/
    site_index_builder:
      class_name: DefaultSiteIndexBuilder
anonymous_usage_statistics:
  enabled: true
  usage_statistics_url: https://stats.greatexpectations.io/great_expectations/v1/usage_statistics
notebooks: